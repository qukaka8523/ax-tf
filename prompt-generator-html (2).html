<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인터렉션학습 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;min-height:100vh;padding:24px 16px}
.wrap{max-width:800px;margin:0 auto}
h1{font-size:22px;font-weight:900;color:#333;text-align:center;margin-bottom:20px}
.sec{border:2px solid #1976d2;border-radius:12px;padding:24px;background:#fff}
.sec-title{font-size:15px;font-weight:900;color:#1976d2;margin-bottom:14px}
.divider{border:none;border-top:1px solid #e0e0e0;margin:20px 0}
.row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.col{flex:1;min-width:200px}
.label{font-size:13px;font-weight:700;color:#555;margin-bottom:6px}
.drop-zone{border:2px dashed #bbb;border-radius:10px;padding:18px 12px;text-align:center;cursor:pointer;background:#fafafa;font-size:14px;color:#999;transition:all .2s}
.drop-zone.has{color:#333;border-color:#1976d2;background:#e3f2fd}
.drop-zone:hover{border-color:#1976d2;background:#e3f2fd}
.sel-row{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.sel-row span{font-size:14px;font-weight:700;color:#555}
select{padding:8px 14px;border-radius:8px;border:1px solid #ccc;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;appearance:auto}
.sel-step{background:#e3f2fd;color:#1565c0}
.sel-type{background:#fff3e0;color:#e65100}
.preview{background:#f5f5f5;border-radius:10px;padding:16px;margin-bottom:0}
.preview h3{font-size:14px;font-weight:900;color:#333;margin-bottom:6px}
.preview p{font-size:13px;color:#666;line-height:1.6;white-space:pre-line}
.ref-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #ccc;font-size:13px;font-family:monospace}
.gen-btn{display:block;margin:0 auto;padding:12px 40px;border-radius:10px;border:2px solid #333;background:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.gen-btn:hover{background:#333;color:#fff}
.result-sec{margin-top:20px}
.out-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.copy-btn{padding:6px 18px;border-radius:8px;border:1px solid #1976d2;background:#fff;color:#1976d2;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.copy-btn.done{background:#1976d2;color:#fff}
pre{background:#f5f5f5;border-radius:10px;padding:16px;font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow:auto;border:1px solid #e0e0e0;font-family:'Noto Sans KR',monospace}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>인터렉션학습 생성기</h1>

  <div class="sec">
    <!-- 인터렉션학습 만들기 -->
    <div class="sec-title">인터렉션학습 만들기</div>
    <div class="sel-row">
      <span>단계명</span>
      <select id="stepSel" class="sel-step"></select>
      <span>활동유형명</span>
      <select id="typeSel" class="sel-type"></select>
    </div>
    <div class="preview">
      <h3 id="prevTitle"></h3>
      <p id="prevDesc"></p>
    </div>

    <hr class="divider">

    <!-- 자료입력 -->
    <div class="sec-title">자료입력</div>
    <div class="row">
      <div class="col">
        <div class="label">교과서 (PDF)</div>
        <div class="drop-zone" id="pdfZone" onclick="document.getElementById('pdfInput').click()">파일드래그</div>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
      </div>
      <div class="col">
        <div class="label">이미지샘플 (jpg/png)</div>
        <div class="drop-zone" id="imgZone" onclick="document.getElementById('imgInput').click()">파일드래그</div>
        <input type="file" id="imgInput" accept="image/*" style="display:none">
      </div>
    </div>

    <!-- 참고 HTML -->
    <div style="margin-bottom:20px">
      <div class="label">참고 HTML</div>
      <input type="text" class="ref-input" id="refInput" placeholder="https://example.com/sample.html">
    </div>
    <button class="gen-btn" onclick="generate()">클로드 프롬프트 생성</button>

    <!-- 결과 -->
    <div class="result-sec hidden" id="resultSec">
      <hr class="divider">
      <div class="out-header">
        <div class="sec-title" style="margin-bottom:0">생성된 프롬프트</div>
        <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">복사</button>
      </div>
      <pre id="resultPre"></pre>
    </div>
  </div>
</div>

<script>
const DATA={
  steps:["준비하기","깨치기","정리하기","확인하기"],
  types:{
    "준비하기":["카드뒤집기","키워드매칭","선수학습퀴즈"],
    "깨치기":["OX퀴즈","분류하기","빈칸채우기"],
    "정리하기":["뚜껑열기(초성)","빈칸채우기","핵심정리카드"],
    "확인하기":["OX퀴즈","4지선다","분류하기"]
  },
  desc:{
    "카드뒤집기":"첨부된 교과서 학습내용 중 핵심단어를 2개~4개 추출하여 카드로 제공\n각 카드를 클릭하면 뒤집어지면서 핵심단어에 대한 설명을 볼 수 있음",
    "키워드매칭":"핵심 용어와 설명을 매칭하는 드래그앤드롭 활동",
    "선수학습퀴즈":"이전 학습 내용을 확인하는 간단한 퀴즈",
    "OX퀴즈":"교과서 핵심 내용을 OX 문제 6~8개로 출제\n사계절 배경 위에 문제와 O/X 선택 버튼 배치\n정답/오답 시 해설 표시",
    "분류하기":"단서 버블을 두 카테고리로 드래그하여 분류하는 활동",
    "빈칸채우기":"핵심 문장의 빈칸을 채우는 활동",
    "뚜껑열기(초성)":"교과서 내용을 표로 정리하고 중요 단어는 초성으로 가린 뚜껑열기\n클릭하면 정답이 공개되며 카운터로 진행률 표시",
    "핵심정리카드":"핵심 개념을 카드 형태로 정리하여 넘겨보는 활동",
    "4지선다":"4개 보기 중 정답을 고르는 객관식 퀴즈"
  },
  refs:{
    "카드뒤집기":"https://qukaka8523.github.io/ax-tf/climate-prepare.html",
    "뚜껑열기(초성)":"https://qukaka8523.github.io/ax-tf/climate-summary.html",
    "OX퀴즈":"https://qukaka8523.github.io/ax-tf/climate-ox-quiz.html"
  }
};

let pdfName='',imgName='';

document.getElementById('pdfInput').addEventListener('change',function(e){
  pdfName=e.target.files[0]?.name||'';
  const z=document.getElementById('pdfZone');
  z.textContent=pdfName||'파일드래그';z.classList.toggle('has',!!pdfName);
});
document.getElementById('imgInput').addEventListener('change',function(e){
  imgName=e.target.files[0]?.name||'';
  const z=document.getElementById('imgZone');
  z.textContent=imgName||'파일드래그';z.classList.toggle('has',!!imgName);
});

['pdfZone','imgZone'].forEach((id,i)=>{
  const z=document.getElementById(id);
  const inp=document.getElementById(i===0?'pdfInput':'imgInput');
  z.addEventListener('dragover',e=>{e.preventDefault();z.style.borderColor='#1976d2'});
  z.addEventListener('dragleave',()=>{z.style.borderColor='#bbb'});
  z.addEventListener('drop',e=>{
    e.preventDefault();z.style.borderColor='#bbb';
    if(e.dataTransfer.files.length){const dt=new DataTransfer();dt.items.add(e.dataTransfer.files[0]);inp.files=dt.files;inp.dispatchEvent(new Event('change'))}
  });
});

const stepSel=document.getElementById('stepSel'),typeSel=document.getElementById('typeSel');
DATA.steps.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;stepSel.appendChild(o)});

function updateTypes(){
  typeSel.innerHTML='';
  DATA.types[stepSel.value].forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;typeSel.appendChild(o)});
  updatePreview();
}
function updatePreview(){
  const t=typeSel.value;
  document.getElementById('prevTitle').textContent='['+t+']';
  document.getElementById('prevDesc').textContent=DATA.desc[t]||'';
  document.getElementById('refInput').value=DATA.refs[t]||'';
}
stepSel.addEventListener('change',updateTypes);
typeSel.addEventListener('change',updatePreview);
updateTypes();

function generate(){
  const step=stepSel.value,type=typeSel.value,ref=document.getElementById('refInput').value,desc=DATA.desc[type]||'';
  const prompt=`당신은 초등학교 사회 교과서를 기반으로 학습 콘텐츠 HTML 파일을 제작하는 전문가입니다.

## 입력 정보
- 교과서 PDF: ${pdfName||'(첨부된 PDF 파일)'}
- 이미지 샘플: ${imgName||'(첨부된 이미지 파일)'}

## 제작 요청
- 학습 단계: ${step}
- 활동 유형: ${type}

## 활동 유형 설명
${desc}

## 제작 규칙
1. 첨부된 교과서 PDF의 핵심 내용을 분석하여 학습 콘텐츠를 제작하세요.
2. 첨부된 이미지 샘플의 디자인 스타일(레이아웃, 색상, 폰트, UI 요소)을 참고하여 화면을 디자인하세요.
3. 결과물은 단일 HTML 파일로, 외부 라이브러리 없이 동작해야 합니다.
4. 폰트는 Google Fonts의 'Noto Sans KR'을 사용하세요.
5. 상단 학습단계 네비게이션, 하단 다음 버튼 등 플랫폼 UI는 포함하지 마세요. 콘텐츠 영역만 제작하세요.
6. 코드는 간결하고 최대한 짧게 작성하세요.
7. 모바일/데스크톱 모두 대응하는 반응형으로 제작하세요.
${ref?`\n## 참고 HTML\n아래 URL의 HTML 구조와 인터랙션을 참고하여 유사한 방식으로 제작하세요:\n${ref}\n`:''}
## 출력
- 완성된 HTML 파일 코드를 출력하세요.
- HTML 파일만 출력하고, 설명은 최소화하세요.`;

  document.getElementById('resultPre').textContent=prompt;
  document.getElementById('resultSec').classList.remove('hidden');
  document.getElementById('copyBtn').textContent='복사';document.getElementById('copyBtn').classList.remove('done');
  document.getElementById('resultSec').scrollIntoView({behavior:'smooth'});
}

function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('resultPre').textContent).then(()=>{
    const b=document.getElementById('copyBtn');b.textContent='복사됨!';b.classList.add('done');
    setTimeout(()=>{b.textContent='복사';b.classList.remove('done')},2000);
  });
}
</script>
</body>
</html>

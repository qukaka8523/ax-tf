<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;width:100vw;height:100vh;overflow:hidden;background:linear-gradient(180deg,#e8f5e9,#e0f2f1);display:flex;flex-direction:column;padding:32px 40px}
.inst{display:flex;align-items:center;gap:10px;margin-bottom:28px;font-size:18px;font-weight:700;color:#333}
.chk{width:24px;height:24px;background:#ef9a9a;border-radius:4px;display:flex;align-items:center;justify-content:center}
.chk svg{width:14px;height:14px}
.cards{flex:1;display:flex;gap:28px;perspective:1200px}
.cw{flex:1;cursor:pointer}
.cd{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);border-radius:20px}
.cw.f .cd{transform:rotateY(180deg)}
.cf,.cb{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;overflow:hidden}
.cf{display:flex;flex-direction:column;align-items:center;justify-content:center}
.cw:nth-child(1) .cf{background:linear-gradient(135deg,#26a69a,#80cbc4)}
.cw:nth-child(2) .cf{background:linear-gradient(135deg,#00acc1,#4dd0e1)}
.cw:nth-child(3) .cf{background:linear-gradient(135deg,#5c6bc0,#9fa8da)}
.cf::after{content:'';position:absolute;width:200%;height:60%;top:20%;left:-50%;background:rgba(255,255,255,.05);transform:rotate(-12deg)}
.kw{font-size:48px;font-weight:900;color:#fff;z-index:2}
.hi{position:absolute;bottom:16px;right:20px;font-size:32px;opacity:.7;animation:hb 2s ease-in-out infinite;z-index:2}
.cw.f .hi{display:none}
@keyframes hb{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.cb{transform:rotateY(180deg);background:#fff;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.cbh{padding:18px;text-align:center;font-size:28px;font-weight:900;color:#fff}
.cw:nth-child(1) .cbh{background:linear-gradient(135deg,#26a69a,#4db6ac)}
.cw:nth-child(2) .cbh{background:linear-gradient(135deg,#00acc1,#26c6da)}
.cw:nth-child(3) .cbh{background:linear-gradient(135deg,#5c6bc0,#7986cb)}
.cbb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.cbb .em{font-size:52px;margin-bottom:14px}
.cbb .df{font-size:19px;font-weight:700;color:#333;line-height:1.6}
.cbb .ex{margin-top:14px;font-size:13px;color:#888;background:#f5f5f5;border-radius:10px;padding:10px 14px;line-height:1.5}
</style>
</head>
<body>
<div class="inst">
  <div class="chk"><svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="3,7 6,10 11,4"/></svg></div>
  오늘 공부할 내용의 핵심 키워드를 확인해 보세요.
</div>
<div class="cards">
  <div class="cw" onclick="this.classList.toggle('f')">
    <div class="cd">
      <div class="cf"><span class="kw">날씨</span><span class="hi">👆</span></div>
      <div class="cb"><div class="cbh">날씨</div><div class="cbb"><div class="em">🌤️</div><div class="df">어떤 지역의 <strong>짧은 시간</strong> 동안의<br>대기 상태</div><div class="ex">예) "오늘은 맑고 쾌청한 날씨예요."</div></div></div>
    </div>
  </div>
  <div class="cw" onclick="this.classList.toggle('f')">
    <div class="cd">
      <div class="cf"><span class="kw">기후</span><span class="hi">👆</span></div>
      <div class="cb"><div class="cbh">기후</div><div class="cbb"><div class="em">🌏</div><div class="df">오랜 기간 한 지역에서 나타나는<br><strong>평균적이며 종합적인</strong> 대기 상태</div><div class="ex">예) "우리나라 기후는 사계절이 뚜렷해요."</div></div></div>
    </div>
  </div>
  <div class="cw" onclick="this.classList.toggle('f')">
    <div class="cd">
      <div class="cf"><span class="kw">계절풍</span><span class="hi">👆</span></div>
      <div class="cb"><div class="cbh">계절풍</div><div class="cbb"><div class="em">🌬️</div><div class="df">계절에 따라 <strong>방향과 성질</strong>이<br>달라지는 바람</div><div class="ex">예) "여름엔 남쪽에서 습한 바람,<br>겨울엔 북서쪽에서 찬 바람이 불어요."</div></div></div>
    </div>
  </div>
</div>
</body>
</html>
